<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未来猴课后反馈助手</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f4f7fb;
  padding:20px 20px 90px;
  color:#333;
}

.container{
  max-width:1100px;
  margin:auto;
  background:#fff;
  padding:24px;
  border-radius:18px;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
}

.top-bar{
  max-width:1100px;
  margin:0 auto 16px;
  background:#2563eb;
  color:white;
  padding:16px 20px;
  border-radius:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  box-shadow:0 4px 16px rgba(37,99,235,.18);
}

.top-title{
  font-size:20px;
  font-weight:bold;
}

.suggest-btn{
  background:white;
  color:#2563eb;
  border:none;
  padding:10px 16px;
  border-radius:999px;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
  white-space:nowrap;
}

.suggest-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(37,99,235,.15);
}

h1{text-align:center;color:#2563eb;}
h2{margin-top:28px;color:#111827;font-size:22px;}
h3{margin-top:18px;color:#111827;font-size:18px;}
label{font-weight:bold;margin-top:18px;display:block;}

input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ddd;
  box-sizing:border-box;
  font-size:15px;
}

textarea{min-height:120px;resize:vertical;}

.tips{
  background:#eff6ff;
  color:#1d4ed8;
  padding:12px;
  border-radius:10px;
  margin-top:12px;
  font-size:14px;
  line-height:1.6;
}

.page{display:none;}
.page.active{display:block;}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.tags{margin-top:10px;}

.tags button{
  margin:6px 6px 0 0;
  padding:8px 14px;
  border-radius:20px;
  border:1px solid #d1d5db;
  background:white;
  color:#374151;
  cursor:pointer;
  transition:.2s;
  text-align:left;
}

.tags button.active{
  background:#dbeafe;
  border-color:#2563eb;
  color:#2563eb;
}

.status-group button.active{
  background:#16a34a;
  border-color:#16a34a;
  color:white;
}

.title-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-top:18px;
}

.title-row label{margin-top:0;}

.change-btn,.small-btn{
  background:#f97316;
  color:white;
  border:none;
  border-radius:10px;
  padding:8px 14px;
  cursor:pointer;
  white-space:nowrap;
}

.small-btn{
  background:#2563eb;
  margin-top:8px;
}

.danger-btn{
  background:#dc2626;
  color:white;
  border:none;
  border-radius:10px;
  padding:8px 14px;
  cursor:pointer;
}

.gray-btn{
  background:#6b7280;
  color:white;
  border:none;
  border-radius:10px;
  padding:8px 14px;
  cursor:pointer;
}

.btn{
  margin-top:20px;
  padding:14px 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  width:100%;
}

.generate-btn{background:#2563eb;color:white;}
.copy-btn{background:#16a34a;color:white;}

#result{
  background:#f9fafb;
  min-height:320px;
}

.card{
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:14px;
  margin-top:12px;
  background:#fff;
}

.card-title{
  font-weight:bold;
  font-size:17px;
  color:#111827;
}

.card-meta{
  font-size:13px;
  color:#6b7280;
  margin-top:6px;
  line-height:1.6;
}

.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}

.filter-bar{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  margin-top:12px;
}

.history-text{
  white-space:pre-wrap;
  background:#f9fafb;
  border-radius:10px;
  padding:12px;
  margin-top:10px;
  display:none;
}

.student-pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin:6px 6px 0 0;
  padding:6px 10px;
  border-radius:999px;
  background:#eff6ff;
  color:#1d4ed8;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:white;
  border-top:1px solid #e5e7eb;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  z-index:999;
  box-shadow:0 -2px 10px rgba(0,0,0,.05);
}

.bottom-nav-btn{
  border:none;
  background:none;
  color:#6b7280;
  font-size:14px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}

.bottom-nav-btn.active{
  color:#2563eb;
  font-weight:bold;
}

.feedback-mode{
  display:flex;
  gap:12px;
  margin-top:20px;
}

.mode-btn{
  flex:1;
  padding:14px;
  border-radius:14px;
  border:1px solid #d1d5db;
  background:white;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

.mode-btn.active{
  background:#2563eb;
  color:white;
  border-color:#2563eb;
}

.student-check-list{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}

.student-check-item{
  border:1px solid #d1d5db;
  border-radius:999px;
  padding:8px 12px;
  background:white;
  cursor:pointer;
}

.student-check-item.active{
  background:#dbeafe;
  border-color:#2563eb;
  color:#2563eb;
}

.group-student-panel{
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:14px;
  margin-top:12px;
  background:#fcfcfd;
}

.group-result-text{
  white-space:pre-wrap;
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:12px;
  margin-top:10px;
}

.suggest-modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.65);
  backdrop-filter:blur(6px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
}

.suggest-modal{
  width:360px;
  max-width:90%;
  background:white;
  border-radius:28px;
  padding:36px 28px;
  position:relative;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.08),0 2px 10px rgba(0,0,0,.05);
  animation:suggestPop .2s ease;
}

@keyframes suggestPop{
  from{transform:scale(.92);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.suggest-close{
  position:absolute;
  right:16px;
  top:12px;
  border:none;
  background:none;
  font-size:28px;
  color:#9ca3af;
  cursor:pointer;
}

.suggest-close:hover{color:#111827;}

.suggest-logo{
  width:84px;
  height:84px;
  object-fit:cover;
  border-radius:20px;
  margin-bottom:16px;
}

.suggest-title{
  font-size:24px;
  color:#111827;
  margin-bottom:22px;
}

.wechat-qrcode{
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:18px;
  border:1px solid #f3f4f6;
}

.wechat-author{
  margin-top:16px;
  font-size:18px;
  font-weight:bold;
  color:#111827;
}

.wechat-tips{
  margin-top:10px;
  font-size:14px;
  line-height:1.7;
  color:#6b7280;
}

@media(max-width:760px){
  .row,.filter-bar{grid-template-columns:1fr;}
  .top-bar{flex-direction:column;align-items:flex-start;}
  .suggest-btn{width:100%;}
}
</style>
</head>

<body>

<div class="top-bar">
  <div class="top-title">未来猴课后反馈助手</div>
  <button class="suggest-btn" onclick="openSuggestModal()">💬 给开发者提建议</button>
</div>

<div class="container">

<h1>未来猴课后反馈助手</h1>

<div class="tips" id="loadStatus">正在读取课程专业评价题库……</div>

<section id="writePage" class="page active">
<h2>写课后反馈</h2>

<div class="feedback-mode">
  <button class="mode-btn active" id="singleModeBtn" onclick="switchFeedbackMode('single')">👤 单独反馈</button>
  <button class="mode-btn" id="groupModeBtn" onclick="switchFeedbackMode('group')">👥 群反馈</button>
</div>

<div id="singleFeedbackArea">
<h3>👤 单独反馈</h3>

<div class="row">
  <div>
    <label>选择班级</label>
    <select id="classSelect" onchange="onClassSelected()"></select>
  </div>
  <div>
    <label>选择学生</label>
    <select id="studentSelect" onchange="onStudentSelected()"></select>
  </div>
</div>

<label>学生姓名</label>
<input id="studentName" placeholder="请输入学生姓名">

<div class="row">
  <div>
    <label>授课老师</label>
    <select id="teacherName"></select>
  </div>
  <div>
    <label>课程类型</label>
    <select id="courseType" onchange="renderProfessionalTags()"></select>
  </div>
</div>

<label>今日主题</label>
<input id="topic" placeholder="例如：观光车 / 贪吃蛇 / 小心雪崩">

<label>课程内容 / 知识点</label>
<textarea id="courseContent" placeholder="例如：
1.了解秋千的运动，学习圆周运动和间歇运动。
2.搭建秋千，学习凸轮结构的组成以及作用。"></textarea>

<label>出勤情况</label>
<div class="tags status-group single" id="attendance">
  <button type="button">✅ 准时</button>
  <button type="button">⏰ 迟到</button>
  <button type="button">📋 请假</button>
  <button type="button">❌ 缺课</button>
</div>

<label>专注度</label>
<div class="tags status-group single" id="focus">
  <button type="button">非常专注</button>
  <button type="button">比较专注</button>
  <button type="button">偶有分心</button>
  <button type="button">明显走神</button>
</div>

<label>理解程度</label>
<div class="tags status-group single" id="understanding">
  <button type="button">掌握扎实</button>
  <button type="button">基本理解</button>
  <button type="button">部分理解</button>
  <button type="button">理解吃力</button>
</div>

<label>课堂参与</label>
<div class="tags status-group single" id="participation">
  <button type="button">主动积极</button>
  <button type="button">正常参与</button>
  <button type="button">被动跟随</button>
  <button type="button">不太配合</button>
</div>

<h2>课程专业评价</h2>

<div class="title-row">
  <label>一、闪光点（多选）</label>
  <button class="change-btn" type="button" onclick="refreshGoodTags()">换一批</button>
</div>
<div class="tags multi" id="professionalGoodTags"></div>

<div class="title-row">
  <label>二、薄弱点（多选）</label>
  <button class="change-btn" type="button" onclick="refreshWeakTags()">换一批</button>
</div>
<div class="tags multi" id="professionalWeakTags"></div>

<div class="title-row">
  <div>
    <label>三、需要提升（多选）</label>
    <div style="font-size:13px;color:#f97316;margin-top:4px;line-height:1.5;">💡 当勾选某个「薄弱点」后，系统会自动匹配对应提升建议</div>
  </div>
  <button class="change-btn" type="button" onclick="refreshImproveTags()">换一批</button>
</div>
<div class="tags multi" id="professionalImproveTags"></div>

<label>老师补充内容</label>
<textarea id="extra" placeholder="请输入课堂具体表现..."></textarea>

<label>布置作业</label>
<textarea id="homework" placeholder="请输入课后作业，例如：
1.回家复习今天的知识点。
2.尝试独立完成作品优化。
3.向家长讲解今天作品的原理。"></textarea>

<div class="title-row">
  <div>
    <label>反馈风格（单选）</label>
    <div style="font-size:13px;color:#2563eb;margin-top:4px;line-height:1.5;">💡 选择不同风格后，生成的课评语气会自动变化</div>
  </div>
  <button class="change-btn" type="button" onclick="refreshStyleTags()">换一批</button>
</div>
<div class="tags" id="feedbackStyleTags"></div>

<button class="btn generate-btn" onclick="generateFeedback(true)">生成课评</button>

<label>生成结果（可直接编辑修改）</label>
<textarea id="result" placeholder="生成后的课评会出现在这里，老师可以直接修改后再复制发送给家长。"></textarea>

<button class="btn copy-btn" onclick="saveAndCopy()">保存并复制</button>
</div>

<div id="groupFeedbackArea" style="display:none;">
<h3>👥 群反馈</h3>
<div class="tips">群反馈会为每个学生分别生成一条独立课评，不是群发文案。</div>

<div class="row">
  <div>
    <label>班级名称</label>
    <select id="groupClass" onchange="renderGroupStudentSelection()"></select>
  </div>
  <div>
    <label>授课老师</label>
    <select id="groupTeacher"></select>
  </div>
</div>

<div class="row">
  <div>
    <label>课程类型</label>
    <select id="groupCourse" onchange="renderGroupStudentPanels()"></select>
  </div>
  <div>
    <label>今日主题</label>
    <input id="groupTopic" placeholder="请输入今日主题">
  </div>
</div>

<label>课程内容 / 知识点</label>
<textarea id="groupCourseContent" placeholder="请输入本次群反馈共用的课程内容 / 知识点"></textarea>

<label>布置作业</label>
<textarea id="groupHomework" placeholder="请输入本次群反馈共用的课后作业"></textarea>

<div class="title-row">
  <div>
    <label>反馈风格（单选）</label>
    <div style="font-size:13px;color:#2563eb;margin-top:4px;line-height:1.5;">💡 群反馈共用一个反馈风格</div>
  </div>
  <button class="change-btn" type="button" onclick="refreshGroupStyleTags()">换一批</button>
</div>
<div class="tags" id="groupStyleTags"></div>

<h3>选择学生</h3>
<div id="groupStudentList" class="student-check-list"></div>

<h3>学生独立评价</h3>
<div id="groupStudentPanels"></div>

<button class="btn generate-btn" onclick="generateGroupFeedback()">批量生成</button>

<div class="actions">
  <button class="small-btn" onclick="copyAllGroupFeedback()">一键复制全部</button>
</div>

<div id="groupResultArea"></div>
</div>
</section>

<section id="classPage" class="page">
<h2>班级管理</h2>

<div class="row">
  <div>
    <label>班级名称</label>
    <input id="newClassName" placeholder="例如：周六上午机器人班">
  </div>
  <div>
    <label>班级默认课程</label>
    <select id="newClassCourse"></select>
  </div>
</div>

<div class="row">
  <div>
    <label>默认老师</label>
    <select id="newClassTeacher"></select>
  </div>
  <div>
    <label>&nbsp;</label>
    <button class="small-btn" onclick="addClass()">+ 新建班级</button>
  </div>
</div>

<div id="classList"></div>
</section>

<section id="historyPage" class="page">
<h2>我的历史课评</h2>

<div class="filter-bar">
  <input id="historySearch" placeholder="搜索学生姓名" oninput="renderHistory()">
  <select id="historyClassFilter" onchange="renderHistory()"></select>
  <select id="historyCourseFilter" onchange="renderHistory()"></select>
</div>

<div class="actions">
  <button class="danger-btn" onclick="clearHistory()">清空全部历史</button>
</div>

<div id="historyList"></div>
</section>

<section id="dataPage" class="page">
<h2>导入 / 导出数据</h2>
<p class="tips">数据保存在当前浏览器 localStorage。更换电脑或清理缓存前，建议先导出 JSON 备份。</p>
<div class="actions">
  <button class="small-btn" onclick="exportData()">导出 JSON</button>
  <input type="file" id="importFile" accept=".json" onchange="importData(event)">
</div>
</section>
</div>

<div class="bottom-nav">
  <button class="bottom-nav-btn active" onclick="showPage('writePage', this)">✏️ 写反馈</button>
  <button class="bottom-nav-btn" onclick="showPage('classPage', this)">👨‍🏫 班级</button>
  <button class="bottom-nav-btn" onclick="showPage('historyPage', this); renderHistory()">🕘 我的</button>
  <button class="bottom-nav-btn" onclick="showPage('dataPage', this)">📦 数据</button>
</div>

<div id="suggestModal" class="suggest-modal-overlay" onclick="closeSuggestModal(event)">
  <div class="suggest-modal">
    <button class="suggest-close" onclick="closeSuggestModal()">×</button>
    <img src="maker-coding-lab-logo.jpg" class="suggest-logo" alt="Logo">
    <h2 class="suggest-title">💬 给开发者提建议</h2>
    <img src="wechat-qrcode.png" class="wechat-qrcode" alt="微信二维码">
    <div class="wechat-author">Connect作者</div>
    <div class="wechat-tips">扫码添加微信，反馈问题或提出功能建议</div>
  </div>
</div>

<script>
const excelFileName="课程专业评价预设题库_薄弱点匹配提升建议版.xlsx";
let professionalBanks={};
let improveBanks={};

const STORAGE_KEY="futureMonkeyFeedbackSystemV5";

const courseOptions=[
"LASY低阶","硬件编程 Mata Q","LASY高阶","硬件编程 Matatalab","9666简易机械",
"Junior机器人","Scratch JR编程","Wedo编程机器人","Scratch","Python","C++",
"AIC比赛集训","Icode比赛集训","科技创新大赛集训"
];

const teacherOptions=[
"叶子老师","奶茶老师","COCO老师","小婷老师","糖果老师","Yuki老师","达达老师",
"熊猫老师","大熊老师","小天老师","小明老师","明浩老师","锤锤老师","小洲老师"
];

const feedbackStyles=[
"亲切家常","严厉负责","文艺走心","幽默风趣","娓娓道来","专业细致",
"温柔鼓励","简洁直接","家校沟通型","鼓励陪伴型","活泼有趣","真诚走心"
];

let appData=loadAppData();
let currentFeedbackMode="single";
let groupResults=[];

function openSuggestModal(){
  document.getElementById("suggestModal").style.display="flex";
}

function closeSuggestModal(event){
  if(!event || event.target.id==="suggestModal"){
    document.getElementById("suggestModal").style.display="none";
  }
}

function loadAppData(){
  const raw=localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{return JSON.parse(raw);}catch(e){}
  }
  return {classes:[],students:[],history:[]};
}

function saveAppData(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(appData));
}

function uid(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2,8);
}

function cleanText(value){
  return String(value||"").trim();
}

function randomPick(arr,count=5){
  const copy=[...new Set((arr||[]).filter(Boolean))];
  copy.sort(()=>Math.random()-0.5);
  return copy.slice(0,count);
}

function setSelectOptions(id,arr,firstText=""){
  const el=document.getElementById(id);
  if(!el)return;
  el.innerHTML=firstText?`<option value="">${firstText}</option>`:"";
  arr.forEach(v=>{
    const o=document.createElement("option");
    o.value=v;
    o.textContent=v;
    el.appendChild(o);
  });
}

function showPage(pageId,btn){
  document.querySelectorAll(".page").forEach(page=>page.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");

  document.querySelectorAll(".bottom-nav-btn").forEach(button=>button.classList.remove("active"));
  btn.classList.add("active");

  renderClassSelects();

  if(pageId==="historyPage"){
    renderHistory();
  }
}

function switchFeedbackMode(mode){
  currentFeedbackMode=mode;

  document.getElementById("singleModeBtn").classList.toggle("active",mode==="single");
  document.getElementById("groupModeBtn").classList.toggle("active",mode==="group");

  document.getElementById("singleFeedbackArea").style.display=mode==="single"?"block":"none";
  document.getElementById("groupFeedbackArea").style.display=mode==="group"?"block":"none";

  if(mode==="group"){
    syncGroupCommonOptions();
    renderGroupStudentSelection();
    renderGroupStudentPanels();
  }
}

function renderButtons(containerId,list,extraClick){
  const container=document.getElementById(containerId);
  container.innerHTML="";

  if(!list||list.length===0){
    const empty=document.createElement("div");
    empty.style.color="#999";
    empty.style.fontSize="14px";
    empty.style.marginTop="8px";

function textSimilarity(a,b){
  const setA=new Set(String(a).replace(/[，。！？、；：\s]/g,"").split(""));
  const setB=new Set(String(b).replace(/[，。！？、；：\s]/g,"").split(""));

  let same=0;

  setA.forEach(ch=>{
    if(setB.has(ch))same++;
  });

  const total=new Set([...setA,...setB]).size;

  return total?same/total:0;
}

function getMatchedImproveSuggestionsByWeak(courseType,selectedWeak){
  if(!selectedWeak.length)return[];

  const courseImproveBank=improveBanks[courseType]||{};
  let suggestions=[];

  selectedWeak.forEach(weakText=>{
    if(courseImproveBank[weakText]){
      suggestions.push(...courseImproveBank[weakText]);
    }

    Object.keys(courseImproveBank).forEach(bankWeakText=>{
      const score=textSimilarity(weakText,bankWeakText);
      if(score>=0.28){
        suggestions.push(...courseImproveBank[bankWeakText]);
      }
    });
  });

  return [...new Set(suggestions.filter(Boolean))];
}

function getMatchedImproveSuggestions(){
  const courseType=document.getElementById("courseType").value;
  const selectedWeak=getSelectedTags("professionalWeakTags");
  return getMatchedImproveSuggestionsByWeak(courseType,selectedWeak);

function addToImproveBank(course,weak,improve){
  if(!course||!weak||!improve)return;

  if(!improveBanks[course]){
    improveBanks[course]={};
  }

  if(!improveBanks[course][weak]){
    improveBanks[course][weak]=[];
  }

  improveBanks[course][weak].push(improve);
}

async function loadExcelBank(){
  const status=document.getElementById("loadStatus");

  try{
    const response=await fetch(excelFileName);

    if(!response.ok){
      throw new Error("无法读取 Excel 文件");
    }

    const arrayBuffer=await response.arrayBuffer();
    const workbook=XLSX.read(arrayBuffer,{type:"array"});

    const mainSheet=workbook.Sheets["课程专业评价题库"]||workbook.Sheets[workbook.SheetNames[0]];
    const matchSheet=workbook.Sheets["薄弱点-提升匹配库"]||workbook.Sheets[workbook.SheetNames[1]];

    const mainRows=XLSX.utils.sheet_to_json(mainSheet,{defval:""});

    mainRows.forEach(row=>{
      const course=cleanText(row["课程类型"]);
      const type=cleanText(row["评价类型"]);
      const template=cleanText(row["评价模板"]);
      const improve=cleanText(row["需要提升的点"]);

      if(!course||!type||!template)return;

      if(!professionalBanks[course]){
        professionalBanks[course]={good:[],weak:[]};
      }

      if(type.includes("闪光")){
        professionalBanks[course].good.push(template);
      }

      if(type.includes("薄弱")){
        professionalBanks[course].weak.push(template);
        addToImproveBank(course,template,improve);
      }
    });

    if(matchSheet){
      const matchRows=XLSX.utils.sheet_to_json(matchSheet,{defval:""});

      matchRows.forEach(row=>{
        const course=cleanText(row["课程类型"]);
        const weak=cleanText(row["薄弱点话术"]);
        const improve=cleanText(row["需要提升的点"]);

        addToImproveBank(course,weak,improve);
      });
    }

    status.innerText="题库读取成功：已启用薄弱点自动匹配提升建议功能。";
    status.style.background="#ecfdf5";
    status.style.color="#047857";

    renderProfessionalTags();
    renderGroupStudentPanels();

  }catch(error){
    status.innerText="题库读取失败：请确认 Excel 文件已和 index.html 放在同一个目录，并命名为：课程专业评价预设题库_薄弱点匹配提升建议版.xlsx";
    status.style.background="#fef2f2";
    status.style.color="#b91c1c";
    console.error(error);
  }
}

function buildFeedbackFromData(data){
  let feedback=`
${getStyleOpening(data.feedbackStyle,data.studentName,data.teacherName)}

今天${data.studentName}学习的是《${data.topic}》，属于${data.courseType}课程内容。
`;

  if(data.courseContent){
    feedback+=`

本节课主要学习内容：
${data.courseContent}
`;
  }

  if(data.attendance||data.focus||data.understanding||data.participation){
    feedback+=`

课堂状态：
${data.attendance?`出勤情况：${data.attendance}`:""}
${data.focus?`专注度：${data.focus}`:""}
${data.understanding?`理解程度：${data.understanding}`:""}
${data.participation?`课堂参与：${data.participation}`:""}
`;
  }

  if(data.professionalGood?.length){
    feedback+=`

课程闪光点：
`;

    data.professionalGood.forEach(item=>{
      feedback+=`• ${item}
`;
    });
  }

  if(data.professionalWeak?.length){
    feedback+=`

本节课需要继续关注的地方：
`;

    data.professionalWeak.forEach(item=>{
      feedback+=`• ${item}
`;
    });
  }

  if(data.professionalImprove?.length){
    feedback+=`

后续提升方向：
`;

    data.professionalImprove.forEach(item=>{
      feedback+=`• ${item}
`;
    });
  }

  if(data.homework){
    feedback+=`

课后作业：
${data.homework}
`;
  }

  if(data.extra){
    feedback+=`

老师补充：
${data.extra}
`;
  }

  feedback+=`

${getStyleEnding(data.feedbackStyle,data.studentName,data.teacherName)}`;

  return feedback.trim();
}

function buildFeedback(){
  return buildFeedbackFromData({
    studentName:document.getElementById("studentName").value||"孩子",
    teacherName:document.getElementById("teacherName").value,
    courseType:document.getElementById("courseType").value,
    topic:document.getElementById("topic").value||"本节课程",
    courseContent:document.getElementById("courseContent").value,
    attendance:getSingleSelected("attendance"),
    focus:getSingleSelected("focus"),
    understanding:getSingleSelected("understanding"),
    participation:getSingleSelected("participation"),
    professionalGood:getSelectedTags("professionalGoodTags"),
    professionalWeak:getSelectedTags("professionalWeakTags"),
    professionalImprove:getSelectedTags("professionalImproveTags"),
    extra:document.getElementById("extra").value,
    homework:document.getElementById("homework").value,
    feedbackStyle:getSelectedStyle()
  });
}

function collectCurrentRecord(resultText){
  const classId=document.getElementById("classSelect").value;
  const cls=appData.classes.find(c=>c.id===classId);

  return {
    id:uid(),
    studentName:document.getElementById("studentName").value||"孩子",
    teacherName:document.getElementById("teacherName").value,
    className:cls?cls.name:"",
    classId:classId||"",
    courseType:document.getElementById("courseType").value,
    topic:document.getElementById("topic").value||"本节课程",
    participation:getSingleSelected("participation"),
    good:getSelectedTags("professionalGoodTags"),
    weak:getSelectedTags("professionalWeakTags"),
    improve:getSelectedTags("professionalImproveTags"),
    extra:document.getElementById("extra").value,
    homework:document.getElementById("homework").value,
    feedbackStyle:getSelectedStyle(),
    resultText,
    feedbackMode:"单独反馈",
    createdAt:new Date().toISOString()
  };
}

function saveHistory(resultText){
  appData.history.unshift(collectCurrentRecord(resultText));
  saveAppData();
}

function generateFeedback(autosave=false){
  const feedback=buildFeedback();
  document.getElementById("result").value=feedback;

  if(autosave){
    saveHistory(feedback);
  }
}

function saveAndCopy(){
  let text=document.getElementById("result").value.trim();

  if(!text){
    text=buildFeedback();
    document.getElementById("result").value=text;
  }

  saveHistory(text);

  navigator.clipboard.writeText(text).then(()=>{
    alert("已保存历史并复制，可直接发送给家长！");
  });
}

function renderHistoryFilters(){
  const classFilter=document.getElementById("historyClassFilter");
  const courseFilter=document.getElementById("historyCourseFilter");

  if(!classFilter||!courseFilter)return;

  const oldClass=classFilter.value;
  const oldCourse=courseFilter.value;

  classFilter.innerHTML='<option value="">全部班级</option>';

  appData.classes.forEach(c=>{
    classFilter.innerHTML+=`<option value="${c.name}">${c.name}</option>`;
  });

  courseFilter.innerHTML='<option value="">全部课程</option>';

  courseOptions.forEach(c=>{
    courseFilter.innerHTML+=`<option value="${c}">${c}</option>`;
  });

  classFilter.value=oldClass;
  courseFilter.value=oldCourse;
}

function renderHistory(){
  renderHistoryFilters();

  const box=document.getElementById("historyList");
  const kw=cleanText(document.getElementById("historySearch")?.value);
  const className=document.getElementById("historyClassFilter")?.value||"";
  const course=document.getElementById("historyCourseFilter")?.value||"";

  let list=appData.history.filter(h=>
    (!kw||h.studentName.includes(kw))&&
    (!className||h.className===className)&&
    (!course||h.courseType===course)
  );

  if(!list.length){
    box.innerHTML='<div class="tips">暂无符合条件的历史记录。</div>';
    return;
  }

  box.innerHTML="";

  list.forEach(h=>{
    const card=document.createElement("div");
    card.className="card";

    const mode=h.feedbackMode==="群反馈"?"👥 群反馈":"👤 单独反馈";

    card.innerHTML=`
      <div class="card-title">${h.studentName}｜${h.courseType}</div>
      <div class="card-meta">
        模式：${mode} ｜ 老师：${h.teacherName} ｜ 班级：${h.className||"-"} ｜ 主题：${h.topic} ｜ 时间：${new Date(h.createdAt).toLocaleString()}
      </div>

      <div class="actions">
        <button class="small-btn" onclick="toggleHistoryText('${h.id}')">查看完整课评</button>
        <button class="small-btn" onclick="copyHistory('${h.id}')">一键复制</button>
        <button class="danger-btn" onclick="deleteHistory('${h.id}')">删除</button>
      </div>

      <div class="history-text" id="historyText_${h.id}">${escapeHtml(h.resultText)}</div>
    `;

    box.appendChild(card);
  });
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g,m=>({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));
}

function toggleHistoryText(id){
  const el=document.getElementById(`historyText_${id}`);
  el.style.display=el.style.display==="block"?"none":"block";
}

function copyHistory(id){
  const h=appData.history.find(x=>x.id===id);

  if(!h)return;

  navigator.clipboard.writeText(h.resultText).then(()=>{
    alert("已复制历史课评！");
  });
}

function deleteHistory(id){
  if(!confirm("确定删除这条历史记录吗？"))return;

  appData.history=appData.history.filter(h=>h.id!==id);

  saveAppData();
  renderHistory();
}

function clearHistory(){
  if(!confirm("确定清空全部历史记录吗？此操作不可恢复。"))return;

  appData.history=[];

  saveAppData();
  renderHistory();
}

function exportData(){
  const blob=new Blob([JSON.stringify(appData,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");

  a.href=url;
  a.download=`未来猴课评系统备份_${new Date().toISOString().slice(0,10)}.json`;
  a.click();

  URL.revokeObjectURL(url);
}

function importData(event){
  const file=event.target.files[0];

  if(!file)return;

  const reader=new FileReader();

  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);

      if(!data.classes||!data.students||!data.history){
        throw new Error("格式不正确");
      }

      appData=data;

      saveAppData();
      renderClassSelects();
      renderHistory();

      alert("导入成功！");

    }catch(err){
      alert("导入失败：JSON 格式不正确。");
    }
  };

  reader.readAsText(file);
}

function init(){
  setSelectOptions("teacherName",teacherOptions);
  setSelectOptions("courseType",courseOptions);
  setSelectOptions("newClassCourse",courseOptions);
  setSelectOptions("newClassTeacher",teacherOptions);
  setSelectOptions("groupTeacher",teacherOptions);
  setSelectOptions("groupCourse",courseOptions);

  setupSingleButtons();
  renderFeedbackStyles();
  renderGroupStyles();
  renderClassSelects();
  loadExcelBank();
}

init();
</script>
